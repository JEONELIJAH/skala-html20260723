<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>holiday</title>
    <style>
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
        .card { width:min(560px,92vw); background:white; border-radius:18px; padding:22px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
        h1 { margin:0 0 12px; font-size:1.4rem; }
        .time { color:#555; font-weight:600; min-width:70px; }
    </style>
</head>
<body>
    <section class="card">
        <h1>🗓️ 나의 강의 시간표</h1>
        <table>
            <thead>
                <tr>
                    <th>🕐 시간</th>
                    <th>월요일</th>
                    <th>화요일</th>
                    <th>수요일</th>
                    <th>목요일</th>
                    <th>금요일</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>09:00 ~ 10:00</td>
                    <td rowspan="3">Full Stack</td>
                    <td rowspan="3">Full Stack</td>
                    <td rowspan="3">Full Stack</td>
                    <td rowspan="3">Full Stack</td>
                    <td rowspan="3">Full Stack</td>
                </tr>
                <tr>
                    <td>10:00 ~ 11:00</td>
                </tr>
                <tr>
                    <td>11:00 ~ 12:00</td>
                </tr>
                <tr>
                    <td>12:00 ~ 13:00</td>
                    <td colspan="5">점심시간</td>
                </tr>
                <tr>
                    <td>14:00 ~ 15:00</td>
                    <td rowspan="3">Full Stack</td>
                    <td rowspan="3">Full Stack</td>
                    <td rowspan="3">Full Stack</td>
                    <td rowspan="3">Full Stack</td>
                    <td rowspan="3">Full Stack</td>
                </tr>
                <tr>
                    <td>15:00 ~ 16:00</td>
                </tr>
                <tr>
                    <td>16:00 ~ 17:00</td>
                </tr>
                <tr>
                    <td>17:00 ~ 18:00</td>
                </tr>
            </tbody>
        </table>

    </section>
</body>
</html>
