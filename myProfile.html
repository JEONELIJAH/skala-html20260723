<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>holiday</title>
    <style>
        :root { font-family: "Noto Sans KR", Arial, sans-serif; --bg:#f5f7ff; --line:#d6dcff; --ok:#2d8cff; }
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
        .card { width:min(560px,92vw); background:white; border-radius:18px; padding:22px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
        h1 { margin:0 0 12px; font-size:1.4rem; }
        .meta { color:#666; margin-bottom:16px; }
    </style>
</head>
<body>
    <section class="card">
        <h1><b>👋 안녕하세요! 저를 소개합니다</b></h1>
        <h2>🍕 내가 좋아하는 음식</h2>
        <ul>
            <li><p>피자 🍕</p></li>
            <li><p>아이스 아메리카노 🧊☕</p></li>
            <li><p>떡볶이 🌶️</p></li>
        </ul>
        <br>
        <h2>🗓️ 올해 할 일</h2>
        <ol>
            <li>매월 책 두 권씩 읽기 📚</li>
            <li>수영 배우기 🏊</li>
            <li>취업하기 👨‍💻</li>
        </ol>
        <br>
        <h2>✨ 나를 설명하는 단어들</h2>
        <dl>
            <dt>💡 호기심</dt>
            <dd>호기심이 짱 많습니다</dd>
            <dt>🐌 꾸준함</dt>
            <dd>꾸준히 일을 잘 합니다</dd>
            <dt>🧑‍🎨 크리에이티브</dt>
            <dd>일을 창의적으로 합니다</dd>
        </dl>
        <br>
    </section>
</body>
</html>
